name: Bug Report
description: Something is broken
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: "1. Run: tooltrust-scanner scan ...\n2. See error"
    validations:
      required: true
  - type: input
    id: scanner-version
    attributes:
      label: Scanner version
      placeholder: e.g. v0.2.3
    validations:
      required: false
